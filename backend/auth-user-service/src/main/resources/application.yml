server:
  port: ${AUTH_USER_PORT:8081}

spring:
  application:
    name: auth-user-service
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_APP_DATABASE:forum_system}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
    username: ${MYSQL_APP_USER:forum_user}
    password: ${MYSQL_APP_PASSWORD:forum_pass_123}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}

security:
  jwt:
    secret: ${JWT_SECRET:dev_local_jwt_secret_key_at_least_32_chars_12345}
    expire-seconds: ${JWT_EXPIRE_SECONDS:86400}

management:
  endpoints:
    web:
      exposure:
        include: health,info
