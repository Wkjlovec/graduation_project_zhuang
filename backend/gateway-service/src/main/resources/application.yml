server:
  port: ${GATEWAY_PORT:8080}

spring:
  application:
    name: gateway-service
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:127.0.0.1:8848}
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - http://localhost:5173
              - http://127.0.0.1:5173
              - http://localhost:5174
              - http://127.0.0.1:5174
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders:
              - "*"
            allowCredentials: true
            maxAge: 3600
      discovery:
        locator:
          enabled: ${GATEWAY_DISCOVERY_LOCATOR_ENABLED:true}
          lower-case-service-id: true
      routes:
        - id: auth-route
          uri: ${AUTH_ROUTE_URI:lb://auth-user-service}
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1
        - id: auth-user-route
          uri: ${AUTH_USER_ROUTE_URI:lb://auth-user-service}
          predicates:
            - Path=/api/users/**
          filters:
            - StripPrefix=1
        - id: forum-route
          uri: ${FORUM_ROUTE_URI:lb://forum-service}
          predicates:
            - Path=/api/forum/**
          filters:
            - StripPrefix=2
        - id: notification-route
          uri: ${NOTIFICATION_ROUTE_URI:lb://notification-service}
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=1
        - id: media-route
          uri: ${MEDIA_ROUTE_URI:lb://media-service}
          predicates:
            - Path=/api/media/**
          filters:
            - StripPrefix=1
        - id: search-route
          uri: ${SEARCH_ROUTE_URI:lb://search-service}
          predicates:
            - Path=/api/search/**
          filters:
            - StripPrefix=1

security:
  jwt:
    secret: ${JWT_SECRET:dev_local_jwt_secret_key_at_least_32_chars_12345}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
